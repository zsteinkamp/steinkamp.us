# Dev Diary — one entry per day.
#
# Schema (per entry):
#   date:    'YYYY-MM-DD'   (quoted, so YAML keeps it a string)
#   impact:  S | M | L      (Small / Medium / Large change impact)
#   summary: 1-2 sentence plain-language summary. Markdown links allowed.
#   projects: optional list of repos touched that day. Each item is an object:
#               - name:    repo/project name (GitHub slug under zsteinkamp)
#                 commits: number of commits that day
#                 ins:     lines added (+)
#                 del:     lines removed (-)
#             These per-repo stats are objective git numbers — bin/devdiary
#             prints a ready-to-paste projects: block, so copy them verbatim.
#
# Newest entries can go anywhere - the page sorts by date. Keep one entry
# per calendar day; if more happened, fold it into that day's two sentences.
#
# Entries from 2019-01 through 2026-05 were reconstructed from git history
# across all repos in ~/dev.

